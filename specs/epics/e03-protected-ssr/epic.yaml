# Epic: Protected SSR + Neon DB Film Catalog
# Migrated from custom specs/RELEASE-PLAN.md on 2026-06-26

id: e03
title: "Protected SSR + Neon DB Film Catalog"
version: v0.3.0

stories:
  - id: "0.3.1"
    title: "Dashboard page (protected)"
    type: feat
    context: domain
    bcps: 3
    status: pending
    depends_on:
      - "0.2.4"
      - "0.1.4"
    tasks:
      - id: "0.3.1.1"
        title: "Update middleware skipRoutes to exclude /dashboard"
        description: >
          The middleware currently does NOT list /dashboard in skipRoutes,
          so it's already protected. Verify this by reading middleware.ts:
          skipRoutes does not contain /dashboard → auth check applies →
          unauthenticated requests redirect to /login. No code change needed.
        files: []
        verify: "grep 'skipRoutes' src/middleware.ts | grep -v dashboard"

      - id: "0.3.1.2"
        title: "Write dashboard.astro SSR page"
        description: >
          Create src/pages/dashboard.astro — Astro SSR page that:
          1. Queries DVD Rental DB for top 20 films (film_id, title, release_year, rating)
          2. Renders them in a simple table/list
          3. Shows a welcome heading and a logout link
          Uses the sql helper from src/db.ts. Protected by middleware automatically.
          Follows existing layout pattern (import Layout from ../layouts/Layout.astro).
        files:
          - "src/pages/dashboard.astro"
        verify: "test -f src/pages/dashboard.astro"

      - id: "0.3.1.3"
        title: "Write dashboard page tests"
        description: >
          Create src/__tests__/pages/dashboard.test.ts — Vitest tests for the
          dashboard page. Tests should:
          1. Verify the SQL query returns expected film shape (film_id, title)
          2. Mock the DB call and verify rendering logic
          Follows existing test pattern from src/__tests__/pages/index.test.ts.
        files:
          - "src/__tests__/pages/dashboard.test.ts"
        verify: "npx vitest run src/__tests__/pages/dashboard.test.ts"

      - id: "0.3.1.4"
        title: "Playwright E2E — dashboard access"
        description: >
          Add a test to e2e/ that covers:
          1. Unauthenticated visit to /dashboard → redirect to /login
          2. Login with valid credentials, visit /dashboard → sees film titles
          (This may be done in story 0.3.5 which is the dedicated E2E story)
        files:
          - "e2e/dashboard.spec.ts"
        verify: "npx playwright test e2e/dashboard.spec.ts"
    verify:
      - "curl -s -o /dev/null -w '%{http_code}' http://localhost:4321/dashboard returns 302 (redirect to login)"
      - "Playwright: login, then visit /dashboard, sees film titles"
      - "npx vitest run src/__tests__/pages/dashboard.test.ts"

  - id: "0.3.2"
    title: "Film detail page"
    type: feat
    context: domain
    bcps: 4
    status: in_progress
    depends_on:
      - "0.3.1"
      - "0.1.4"
    tasks:
      - id: "0.3.2.1"
        title: "Add getFilm(id) to films lib"
        description: >
          Add getFilm(id: number) function to src/lib/films.ts that:
          1. Queries a single film by film_id
          2. Joins actor table via film_actor to get actors
          3. Returns film details + actor list
          4. Returns null for invalid IDs
          Type: FilmDetail with actors: Actor[]
        files:
          - "src/lib/films.ts"
        verify: "grep -q 'export async function getFilm' src/lib/films.ts"

      - id: "0.3.2.2"
        title: "Write film detail page"
        description: >
          Create src/pages/films/[id].astro — Astro SSR page that:
          1. Reads film ID from Astro.params
          2. Calls getFilm(id)
          3. Renders film title, year, rating, description
          4. Lists actors
          5. Shows 404 via Astro.redirect when film is null
          6. Follows existing Layout pattern
        files:
          - "src/pages/films/[id].astro"
        verify: "test -f src/pages/films/[id].astro"

      - id: "0.3.2.3"
        title: "Write film detail tests"
        description: >
          Create src/__tests__/pages/films/index.test.ts — Vitest tests:
          1. getFilm returns film with expected shape
          2. getFilm includes actors array
          3. getFilm returns null for nonexistent ID
          Mock sql from db.ts as before.
        files:
          - "src/__tests__/pages/films/index.test.ts"
        verify: "npx vitest run src/__tests__/pages/films/"
    verify:
      - "npx vitest run src/__tests__/pages/films/"

  - id: "0.3.3"
    title: "Protected API endpoint"
    type: feat
    context: domain
    status: pending
    depends_on:
      - "0.3.1"
      - "0.1.4"
    steps:
      - "Write src/pages/api/films.ts — queries DB, returns JSON"
      - "Authenticated request returns JSON"
      - "Vitest: API returns correct shape"
    verify:
      - "curl -s -o /dev/null -w '%{http_code}' http://localhost:4321/api/films returns 302 (redirect if unauthenticated)"
      - "curl -s http://localhost:4321/api/films | jq '.[0].title' returns film title"
      - "npx vitest run src/pages/api/films.test.ts"

  - id: "0.3.4"
    title: "Session validation on server"
    type: feat
    context: infra
    status: done
    steps:
      - "Middleware validates session token with upstream Neon Auth before allowing access"
      - "Invalid/expired token → redirect to /login"
      - "Valid token → proceeds to page"
    verify:
      - "Vitest mock shows upstream call"
      - "Playwright: login, visit /dashboard, status 200"

  - id: "0.3.5"
    title: "Playwright E2E — protected routes"
    type: feat
    context: infra
    status: pending
    depends_on:
      - "0.3.1"
      - "0.3.2"
    steps:
      - "Write e2e/protected.spec.ts — unauthenticated redirect, authenticated access, film detail"
    verify:
      - "npx playwright test e2e/protected.spec.ts"

risks:
  - "Requires real Neon Auth project with valid credentials"
  - "DVD Rental DB must be pre-loaded with film/actor/film_actor data"
  - "Netlify function timeout on DB queries — use Neon serverless HTTP driver"
