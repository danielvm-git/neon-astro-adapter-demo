# Epic: Client Auth + Full Navigation Flows
# Migrated from custom specs/RELEASE-PLAN.md on 2026-06-26

id: e04
title: "Client Auth + Full Navigation Flows"
version: v0.4.0

stories:
  - id: "0.4.1"
    title: "Profile page (client auth)"
    type: feat
    context: domain
    status: done
    bcps: 3
    depends_on:
      - "0.2.1"
    steps:
      - "Write src/components/ProfileClient.astro with client island"
      - "Client island calls getSession() and renders email"
      - "Unauthenticated shows 'Not logged in'"
    tasks:
      - id: "0.4.1.1"
        title: "Create ProfileClient.astro client island component"
        file: src/components/ProfileClient.astro
        actions:
          - "Define Props interface with authUrl: string"
          - "Render placeholder <div id=\"profile-content\"> with loading text"
          - "Add <script define:vars={{ authUrl }}> that dynamically imports createAuthClient"
          - "Script calls getSession(), updates DOM with email or 'Not logged in'"
      - id: "0.4.1.2"
        title: "Create profile.astro page"
        file: src/pages/profile.astro
        actions:
          - "Frontmatter reads NEON_AUTH_BASE_URL from env"
          - "Render <ProfileClient authUrl={...} /> with Layout"
          - "Title: 'Profile — Neon Auth + Astro Demo'"
      - id: "0.4.1.3"
        title: "Write Playwright E2E for profile page"
        file: e2e/profile.spec.ts
        actions:
          - "Test authenticated: login, visit /profile, verify email displayed"
          - "Test unauthenticated: visit /profile, verify 'Not logged in'"
      - id: "0.4.1.4"
        title: "Write Vitest unit test"
        file: src/__tests__/pages/profile.test.ts
        actions:
          - "Test page renders without crashing"
          - "Test client island placeholder structure"
    verify:
      - "curl -s http://localhost:4321/profile | grep -q 'script'"
      - "npx playwright test e2e/profile.spec.ts"
      - "npx vitest run src/__tests__/pages/profile.test.ts"

  - id: "0.4.2"
    title: "Sign-out flow"
    type: feat
    context: domain
    status: done
    bcps: 2
    depends_on:
      - "0.2.1"
      - "0.4.1"
    steps:
      - "Add sign-out button (calls signOut())"
      - "After sign-out, /dashboard redirects to /login"
      - "Vitest: signOut clears client state"
    tasks:
      - id: "0.4.2.1"
        title: "Add sign-out button to ProfileClient.astro"
        file: src/components/ProfileClient.astro
        actions:
          - "Add sign-out button below email display"
          - "Button click calls client.signOut() then redirects to /"
          - "Unauthenticated state: no sign-out button"
      - id: "0.4.2.2"
        title: "Write sign-out E2E test"
        file: e2e/signout.spec.ts
        actions:
          - "Visit /profile without login, verify no sign-out button"
          - "(Full sign-out flow requires live Neon Auth backend)"
    verify:
      - "npx playwright test e2e/signout.spec.ts"
      - "npx vitest run src/auth-client.test.ts"

  - id: "0.4.3"
    title: "Navigation with auth state"
    type: feat
    context: domain
    status: in_progress
    bcps: 3
    depends_on:
      - "0.4.1"
      - "0.2.1"
    steps:
      - "Write src/components/NavClient.astro with conditional nav"
      - "Logged-out state shows 'Login' link"
      - "Logged-in state shows 'Dashboard' and 'Sign out'"
    tasks:
      - id: "0.4.3.1"
        title: "Create NavClient.astro with conditional auth nav"
        file: src/components/NavClient.astro
        actions:
          - "Two-script pattern: is:inline sets window.__NEON_AUTH_URL__, bundled module imports createAuthClient"
          - "Render two nav sections: logged-out (Login, Sign up) and logged-in (Dashboard, Sign out)"
          - "On session check: show/hide appropriate section"
      - id: "0.4.3.2"
        title: "Update Layout.astro with NavClient"
        file: src/layouts/Layout.astro
        actions:
          - "Replace static nav links with <NavClient authUrl={...} />"
          - "Include fallback static nav when authUrl not configured"
      - id: "0.4.3.3"
        title: "Write Playwright E2E test"
        file: e2e/nav.spec.ts
        actions:
          - "Visit / without login, verify 'Login' link visible"
          - "(Full auth-dependent nav requires live Neon Auth backend)"
    verify:
      - "grep -q 'getSession' src/layouts/Layout.astro src/components/NavClient.astro"
      - "npx playwright test e2e/nav.spec.ts"
      - "npx vitest run"

  - id: "0.4.4"
    title: "Error handling pages"
    type: feat
    context: domain
    status: pending
    steps:
      - "Auth upstream unreachable → show 'Service temporarily unavailable'"
      - "DB connection failure → show 'Database error' page"
      - "Invalid film ID → 404 page"
    verify:
      - "Vitest simulates fetch failure"
      - "Vitest simulates DB timeout"
      - "Playwright: visit /films/99999, sees custom 404"

  - id: "0.4.5"
    title: "POST API endpoint"
    type: feat
    context: domain
    status: pending
    depends_on:
      - "0.3.3"
    steps:
      - "Write src/pages/api/reviews.ts — POST handler behind auth"
      - "Authenticated POST succeeds"
    verify:
      - "curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:4321/api/reviews returns 302"
      - "Playwright sends POST with session cookie, status 200"

  - id: "0.4.6"
    title: "Playwright E2E — full user journey"
    type: feat
    context: infra
    status: pending
    depends_on:
      - "0.4.1"
      - "0.4.2"
      - "0.4.3"
      - "0.4.4"
      - "0.4.5"
    steps:
      - "Write e2e/full-flow.spec.ts — register → login → browse dashboard → view film → profile → POST review → sign out → login redirect"
    verify:
      - "npx playwright test e2e/full-flow.spec.ts"

risks:
  - "Reviews table schema must be defined before 0.4.5"
  - "Graceful degradation policy needs resolution (no-op vs hard error)"
